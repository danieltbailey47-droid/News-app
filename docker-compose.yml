version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: news_db
    restart: always
    environment:
      MYSQL_DATABASE: news_db
      MYSQL_USER: newsuser
      MYSQL_PASSWORD: newsapp123
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  web:
    build: .
    container_name: news_app
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_HOST: db
      DATABASE_NAME: news_db
      DATABASE_USER: newsuser
      DATABASE_PASSWORD: newsapp123

volumes:
  db_data:
{% extends "base.html" %}

{% block content %}
<form method="post">
    {% csrf_token %}
    <h2>Edit Article</h2>
    <input type="text" name="title" value="{{ article.title }}" required>
    <textarea name="content" rows="8" required>{{ article.content }}</textarea>
    <button type="submit">Save Changes</button>
</form>
{% endblock %}
